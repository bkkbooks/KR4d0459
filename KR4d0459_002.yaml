body:
  text: 東庵集卷二元滕安上撰七言古效廬山髙體泰山巖巖有如此兮根磅礴乎厚土峰峻極兮穹冥太初灝灝三元氣是皆洪濤巨浪兮不知何代凝結而為形乾端坤倪忽呈露文理錯綜而貫兮下聚元形而為嶽上聚元精而為星維嶽奠兹東服兮巍然嚴君坐大庭羣山列侍悉臣妾鞠躬俯首聽使令參贊造物春四海孕載神氣流風霆在昔勳華巡狩而致祀兮明德與燔燎而惟馨豈聞風行雷動千乘萬騎隘原野增髙厚下肆侈誇鴻寧七十二君果其誰兮金泥玉檢刻何事茂陵管子言非經陋哉吕政不務德虎視黔首以兵刑東逰求仙恍惚無所遇歸猶誑嶽誣云亭大夫有松不與蔽雨雹當時要洗姦斯銘聖朝禮秩若稽古嵗時香火來帝扄惟嶽降神佐國祚不騫不崩億萬齡永為皇國作巨鎮豈徒千里供一青何當長袖拂絶頂一杯敬奉山之靈我從孔林北馳逰覽兮雲煙變態若相迓馬首三日瞻畫屏平生竒觀一朝遂髙登俯瞰火輪半夜升滄溟鄱陽倪鏜仲寶受南康路教請起歸江書院於安仁鄉邑乞詩為餞五嶽混一三光全京師首善開賢關慶霄下飾物玉色于于四海來衣冠詞華誰鼓天機翰江南才子今倪寬白鹿古洞充仙官拜言小臣無以報明德請起書院於餘干嵗給米千石構厦先百間黃閣領玉音紫泥出金鑾眼前突兀明雘丹三冬深燠九夏寒登堂鼓篋樂絃誦侁侁若風舞雩壇丈夫有才貴有用百萬當作秋毫看他年養出一范韓致君澤民上下安問君所直直幾何吾之一身殊不愁窮單但恐去古寖逺成才難錦江秀色回波瀾春風浩浩生湖山青襟望君君早還焦仲安為雲南省郎中張侯乞詩勉為賦此焦君别我走馬作萬里雲南行乞詩為贈張侯磊落之竒英五經撑腸飾吏事九州殊口垂文星武庫隱隱森長兵昔年龍虎山前役獨提尺箠當千百籌邊樓籌筆驛古人功名光竹帛用此長歌贈連璧衛州趙録判作星丸漏於汲門山澗諸公為首倡乞詩為賦鳴鶴警夜半風雨晨雞呼人而不知時禽鳥曽不如唐都洛下已矣夫池州徐州遺楷模狂夫瞿瞿栁樊圃大智間間蓮刻壺風輪旋轉幾何億萬載三十萬里摶堪輿西墮金畢逋東生玉蟾蜍誰推挽是主張是古今一頃無須㬰神虬吞吐良區區水滑鐵澀猶患成差殊相臺趙參軍又得造化樞一屏肺腹含太虛蟻穴屈曲流星珠更人坐守月如魚間不容髮投機初初如九轉丹仙翁叱付龍虎爐復如單輪車太行走過羊腸塗上極𤣥門下尾閭無濡無燥無疾徐天行有信人有巧晝夜百刻分錙銖衛都門頭鳴鼓桴一城之民安起居被檄從南來巨軸開新圖玩之不去手垢癢遭爬梳若非六丁取獻女史星亦當四時禁直承明廬於戲天運甚𤣥逺一旦坐致如何符昭昭天理不煩度數取誰其一唱醒蒙愚君能併理達民政羲和不獨歌唐虞因并門馮和卿蓄却波韋通甫所畫乘龍託友人王思敬求詩京師亦為賦此天上羣龍人不識人間畫工畫不得韋郎何處見真龍毫末淋漓風雨集前幅一龍初奮蟄巨爪拉山山破壁後幅一龍新蛻骨蜿蜿蜒蜒醉無力就中二幅更駭怒拔樹噴珠轟霹靂并門馮君好事者傾囊不惜千金直夜藏深匱鬼神泣晝掛虛堂窗户濕愛之玩之不一足託友求詩走京國畫中畫龍雲霧質詩中畫龍有龍德此詩此畫當誰看他日示君窺牖客題劉節副家藏假志堅畫龍神哉亨龍德配乾六位上下隨時遷丹青名家本形似變化不測誰能傳世間俗子亦妄作往往蛟鰐雜鯨鱣葉公風聲已遼邈龍門假生名志堅君家此畫乃其筆絹素黯淡浮雲煙怒濤激射海欲立鱗甲出火光赫然頷珠戲摘向空擲呀齦倒角將飛天假生白首宣政間落魄不受妻孥纒河東父老多異說非人非鬼非神仙一朝蹤跡忽不見或言躍入清泠淵夢讀太白集有千年萬年若昨日古人今人同一塵之句覺而補成之天風日日吹天雲飛來飛去秋復春千年萬年若昨日古人今人同一塵昻昻藏藏不吾識啾啾唧唧將誰親安得乘槎駕滄海濯足萬里明河津中秋玩月於平山堂提刑亷公索賦黑雲滿天天欲昏詩人待月開吟軒西北長風起蘋末為我一掃隂霾屯堪輿此東偏下瞰碣石門人間未得月先覩玻瓈分羲和逺頓六龍轡凌空倒影開精魂俄驚黃道上霄漢表裏洞徹無纎痕騎風御氣八極表定識底物為乾坤下看歌樓舞榭閙鐘鼓何異寒螿唧唧咽草根我持一杯酒問月月不言我不怪爾圓復缺我不怪爾東西奔姮娥太陽妃萬古帝女孫胡為養妖蟇屢被妖蟇吞春秋書日不書月玉川寸鐵當雪寃奮袖指月月不蝕坐令還我太素元衆賔笑狂一絶倒清光奕奕飛金樽叔常劉弟為兒子詵作剛鬛大筆故有此贈叔常吉甫壻也古人學書指穴衾古人大書惟撮襟兔毫鼠尾弱于寸宣城散卓才如簮髮毛老秃心力盡不供擘窠開丈尋西山野豕藏煙岑甲膚生鬛攢鐵針黃臉老將一矢斃擷英拔萃來儒林三薰三沐入拘束如縳猛士惟恐不受擒洞庭雲夢可一吸萬鈞九鼎力足任孱生不敢捉殆如疲卒駭緑沈麁豪不敢擲裂地恐有霹靂音䇿勳中書儘竒畫許大一身都是心沉著痛快盡在是青雲非逈淵非深其誰擅雄藝吾弟出向歆冰清玉潤自得不傳妙天下能事無古今足知知書乃能筆譬之善彈能斫琴阿先未解書顧嘗有書淫遽然此贈太早計風檣陳馬當駸駸㑹看潄墨作枯枿拂拭素壁傾千金友人以虎文藤杖見贈因舉退之赤藤杖歌就用其韻答之管中一斑未易窺赤藤虎文森陸離憶昔夢追羲和御扶桑日出雞喔咿海邊一枝照海水坤宫想有神人持恍疑白額隱深谷矗立惟見一尾麾俄驚快劒一斫斷殷殷寃血猶淋漓天吳世寶遺子孫子孫載拜忽我遺歸來健步耻跨馬足前竒險皆平夷俯身控臂探禹穴一掃鬼蜮絶狐疑支頥長嘯立江渚分披四走愁蛟螭有時醉卧著枕底風生耳側如清箎改名豚兒作虎子乃翁行處此物當典司汾州道者邵叔玉庸齊吐食卲卿汾晉來妙理深機達通塞手中三箭䇿雋功橫流汨汨從溝洫詞林老伯爭贈詩劈紙瓊瑶陪報德我聞太古之民淳以默恬淡虛無咸自得軒岐問答啓聖源黎苗已陷螟蟊惑空桑産士登廟堂湯液猶能活商國垂危始覺有良醫安樂無人知保嗇方家非無不世才智囊青裹千金翼未許屈指到膏肓九臟幾微見顔色人生世間一脆物血脉詎容停一息卲卿卲卿老愈精溥援疲癃躋夀域親家邊翁翁媪皆八十其子求為詩故令門生王簡書此作四幅以贈之屋頭山色明無塵屋下流水清無痕靜中自得仁者夀白頭翁媪太朴存疑年不解道甲子八十餘度庶草蕃膝前三子子有孫諸婦肅肅無間言力田每䝉官長勞地偏還聞車馬喧刺船舉網得新鯉油油凍酒香浮盆古稱山中凍醪謂之春酒里中皆能造之相看妻黨厯三葉重與小兒重結婚嵗時來往要難老留春㑹作朱陳村王尚書太夫人八十夀崑池仙人冰雪膚天孫為織雲錦裾東床坦腹得佳壻三子落落皆明珠就中徑寸出少海光耀便達承明廬絲綸五色來天衢玉帝要斡天官書青山千里太行路白雲一片隨肩輿入門布地金氍毹登堂步履嗔人扶春風八秩初度初嶽牧結軌公卿趨鱗次奉常珍鴈序問起居尚書氣與秋天杳此時顔色何舒徐萊衣斕斑起舞未足道文犀垂帶金垂魚大孫渥窪駒小孫丹山雛已能舉樽陪父後望中聖善歡愈愈子孫如此夀如此人難如意意盡如神理元與隂功符冥冥酬答捷鼓桴在昔參謨君耋年髮亦烏東垣搢紳入歌詠字字不减瓊瑶琚今兹盛事比尤盛懿範籍籍傳京都詩中例有丹青手重畫君家家慶圖贈相者相馬不相肥相人不相衣輕衣何必裏磊落肥馬誰書案停杯枕臂時陳郎畫出樂天詩那些更愜屏風樣去捲青氊是栁枝走筆和仲安國博楷笏詩韻鳳凰銜得崑山玉大橫庚庚透其骨外看溫潤內强梗必有此人任此笏怪來入手重摩挲却是東家冡邊物指日不食天不崩饒搘突兀將傾屋此木八極根株連此木萬古枝葉傳此木庇物大有年此木入火寒無煙巖巖伊周降自天聲色不動人主前泰山四維咸安然鳶飛魚躍還天淵要當藴展智囊底略涉阿諛為笏耻書思書命復書對跪進孜孜戒胥史去年我作齊魯逰孔令相陪謁槐市臨行見贈笏五枝期我嬰鱗陳逆耳於戲吾亦願效道輔所執除妖邪一擊腦裂靈宫蛇笏亦願效張綱之輪諌危亡要誅當路之豺狼將軍雕戈鎮邊閫何如忠良持此立邦本五言律手植檜簮詩并序友人石㑹源來自孔林以手植檜見惠且曰是檜也灰燼之餘根骨不朽下達淵泉取之而無窮隱上之印章遺山之聖像皆是物也余因其材而為簮長踰二寸許文章紏纒膏澤芳潤端然而玉質橫鏗然而金聲振信乎吾先聖之手澤也幸而得之以固吾髮知固吾心以正吾冠知正吾道此又吾先聖託物示戒之遺意終身佩服有不盡者謹拜手稽首而為之詩兼叙其所得之始末云草木餘灰燼心真自嵗寒大成芳潤在具體至文完潜擲金聲振橫施玉質端殷勤千載後長與固儒冠元氏怡齊詩日月堯天北遙聞孝弟馨八龍荀氏子四海德星亭雪圃芳棠棣風原翥鶺鴒相逢驚授簡直欲寫西銘暮春醉中渺渺春何處長吟日易斜光隂渾似水風雨不饒花蜜就蜂儲粟巢成燕有家遙憐杜陵老爛醉是生涯六月久雨一雨連朝夕愁看甲子過勢從簷外黑聲向枕邊多風壤同三蜀雲濤接兩河莫非枯旱嵗龍有羡餘波平山堂木芍藥盛開紫素相間香韻殊絶門生邀賞因為賦此造物偏留意矯柔不自勝峩冠瓊羽軟髙髻紫雲層似動香風逺微酣酒暈蒸一杯相慰眼無愛亦無憎枕上偶成不覺老將至駸駸四十强眼花如隔霧髮種半成霜匪石心無轉甘芹念未忘樂天吾分足豈敢傲羲皇東昌晚出晚出聊城驛羸驂困短鞭灘聲行處盡野色望中圓文史將安用功名信偶然家山一千里花栁滿前川送劉文卿教授廣平憶昔荆州座仲寬席上始相識凌晨見素霞更生堪祭酒子駿自名家餽送囊無贐行裝書滿車諸生談宋璟勿說賦梅花張禮部夢符以除夕元日即事二詩見示因次其韻四首老髮不再緑春風奈我何每逢新嵗換偏覺故情多椒酒俗難免藜羮腹漫皤家人應念我遙賦扊扅歌四十今有九前非知奈何老隨新嵗甚悲向此宵多一室壁徒立雙髦鬒變皤三春歸未得回首一髙歌惠風開霽色化日自舒長夏厯承三統周文軼百王四時調玉燭一嵗入金穰朝退聨新句誰穿百步楊服色依依辨鞭聲隱隱長九重嚴陛衛萬國拜天王德澤流寬大春祺誦簡穰卿雲得觀此賦豈獻長楊春官李敬甫過山中出其太夫人夀卷徴詩為賦此五首淑善元多夀誰云七十稀機絲雲五色卵翼鳳三飛石窖恩非晚金魚事庶幾繩繩滿蘭玉千載仰春暉桂里聮三秀萱幃正七旬範儀陳氏母風度謝夫人花栁肩輿穩笙歌夀酒春㑹看從子貴封誥紫鸞新不惜殷勤力栽培玉樹枝正當眉夀日受用子榮時婉婉嬰孺戲融融語笑滋南陔千載上想見古人詩教子柔儀正成家內助深介眉春際酒為夀俸餘金碧落長庚夢陽暉寸草心在隂鳴和處天徹九臯音拜舞輝金紫春官二列卿子皆為母夀人幾似公榮桂樹秋香裏萱堂春意生牛腰看軸巨珠玉寫蓬瀛集賢學士趙菊山挽章趙宋宗室燕王德芳之後燕邸風流逺周京寵數優斯人豈黃壤上界有瀛洲像久生祠在公嘗守南安民立祠魂先故里遊青山菊花露瀟灑不勝秋中相亷公挽章二首噩噩詩書府巖巖柱石姿蒼生仰威鳳清廟失元龜事業今千古風流彼一時旋聞林甫敗惜不九齡知翊贊真王運賢聞貞觀初胸中九雲夢身後五車書往事遽如此斯人今有諸惟天不容僞子舍盡金魚題劉執中父挽章卷昔年居故里邂逅識夫翁此日來京國風流見阿戎情親數面後存歿轉頭中何意題追挽含凄目斷鴻五言排律贈别楊紹先四十韻故里逢新契今時得古人長身渾是膽弱冠已能文業繼關西後材空冀北羣霜鷹張羽翮天馬弄精神斗捩層霄上橫行萬里馴席前竒賈誼𥜗裂壯終軍自愧囊中頴元非席上珍義形羞詭遇道在詎憂貧逸駕希方軌𤣥途每問津門墻涉洙泗模範仰河汾圖究崑源馬經窮魯野麟雌黃從毁譽真白不緇磷天地渾涵外風烟寂寞濵豹文甘霧晦鶴唳待天聞方念居成索俄欣德有鄰清談噴冰雪髙義薄天雲肝膈深相照風流各任真餘波潜九潤同器賴三薰李菊期齊秀周醪幾醉醇春風散庭樹皎月上秋旻壺缺歌逾壯途窮氣益振往來盟正固南北袂重分疇昔愁辭客於兹喜餞君千年當際㑹一氣轉洪鈞版籍維蟠木蘿圖蔓楚椿同舟爭待郭束帛自迎申乾德真人造觀光上國賔衮衣瞻日月曳履上星辰虎踞龍蟠地麟翔鳳翥臣漢威王霸備周制禮儀新虡業鏘金石軒墀藹搢紳九重鳴蹕曉萬國拜王春藏器終施用儒冠靡誤身騶虞澄自見尺蠖屈求伸夙幸通金籍榮膺侍紫宸千金無贈别一語吐情親克已當由禮先人即近仁佞須懷折角忠莫憚嬰鱗筆秉春秋直心持夙夜寅功名此張本輝赫動光塵用耶律溫甫相寄詩韻為先正雙溪挽章以答之昔在麒麟閣何人將相材龍津分漆水鼇背負蓬萊滄海珠無纇崑山玉不灰忠純媚廷闕隂德潤雲來直道慙三窟風流妙一臺空門訪摩詰方外有良駘不獨文園㑹時開繡佛齊登臨千古意慷慨百年懷威鳳多竒羽神魚豈暴腮言雖遭止棘志不忘㳙埃鎔液歸陶冶生成刺剸裁詞章雕月碎諫疏挽天回宰木驚風樹空階漫雨苔人琴共凄斷鄰笛更悲哀王謝諸郎在班揚多士魁七星騰劒氣八駿盡龍媒冀北須逢樂豐城自有雷父書元飽讀先府㑹重開愁隔雲千里遙傾酒一杯得詩增感慨長望幾徘徊

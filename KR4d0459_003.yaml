body:
  text: 東庵集巷三元滕安上撰七言律賡劉吏部賀尊號詩韻帝座森嚴拂泰階至元中統治華開四時有運天無語萬國不知春自來采色愧難圖炳日英聲惟竦聽鳴雷從今一萬餘千嵗嵗嵗長傾萬夀杯九重春色動蓂階寳籙封符玉册開文武丕膺千嵗統衣冠森擁萬方來龎恩滂沛知時雨虫蟄昭蘇出地雷聞説天顔深有喜九重敬為舉臣杯寄屯田千户和嘉甫將家門户見詩豪三十金符已在腰此日屯田趙充國他年分閫霍嫖姚令嚴半夜霜初下氣勇三秋海欲潮累葉勲庸今到汝涓埃須答聖明朝翰林修撰輔伯賢守滑州文如飜水筆如椽士論猶推器識先柳仲官箴有家法蔡邕書籍得真傳伯賢閣子靖之甥也題輿久渴朱轓守畫舫冝居玉署仙歐陽永叔嘗為滑州通判置畫舫齋正獵三長修信史𤓰期應不待三年牛欽夫尹同州四壁蕭蕭只故然一官隨分任推遷朱轓皂盖二千石東郡西州四十年曾是無心致馴雉肯容煩手觸烹鮮馬頭青眼相迎處鄭重三峰玉井蓮送湯善甫從宣慰湯侯淮西之行修髯如漆過帶鈎津津眉宇明雙眸中探肝膽裂絃直外觀辭氣繞指柔波濤收斂髙岸出英華振落甘實秋淮西地濶使君好先須賣劒求耕牛三月晦日雨中縣齋寂寂若僧家病枕蕭蕭任物華人意但隨忩外草雨聲無奈樹頭花不因雞唱忘中飯偶見蜂喧記晚衙可是萊蕪窮令尹釡中已報産魚蛙中書外郎林君一蓄鎮紙石蝦蟆芸軒有詩予亦同賦三首蝦蟆葢化石閣閣跳鳴出碧瀾海風吹結入驚㸔萬釘痱磊雲根澁滿腹精神月露寒恥化褭蹏豐蔀屋喜隨蝌蚪上烏欄補天宰籍媧皇手誰道蒼頑不屬官金蝦蟆事見夷堅志脹腹膨脝飽石脂不鳴那復計公私排風有質安書府滴水無心近硯池人見彭城蓄霜蟹劉仲寛秘監藏石化蟹我從皇澗得靈龜得石化龜張仲安有銘座中誰有金華術一叱還生看共嘻坎井喧鳴笑蜀川誰教跳躑上青編應羞讒口曾吞月却許剛腸為補天元鼎陣圖魚復小稚圭鼓吹磬聲懸幾時洗髓瓊酥出清比䕫州背上泉䕫州有蝦蟆石泉出其背水味甚佳暮春再到仙林寂然無人因憶覺大中集句以寄嘗憶林中訪惠持不堪愁坐更相思長廊無事僧歸院緑葉成隂子滿枝斷送一生惟有酒掃除習氣不吟詩物情多與閒相稱静看遊絲到地時僉鄂省崔允蹈以能復授㕘政將歸曹編修顯祖乞詩山南門地冠公侯鄂省重臨控上游為相謀猷先得體報君肝膽要分憂乾坤納納三春雨江漢滔滔萬斛舟會聽飛來好消息歸鴻行過庾公樓華不注城下洋洋萬頃流城頭落落一峰秋天垂神劒波濤湧雲捲龍旌風雨愁白也髙吟出千仞齊來鏖戰㡬三周山靈顧我如相識飛翠扶搖入酒甌趵突泉魚龍驚駭鳥飛囬百步遙聞發殷雷地脉自初無壅結水心何苦亦崔嵬雪車直立秋風惡冰塔寒凝夜月來安得無塵袖中手為余摩撫鏡平開聊城魯仲連廟懐古棋刼紛紜惜壯圖區區儀衍果何如相謀安用千金夀解難聊揮一箭書誰從乗桴浮海嶠永慚舐痔衒秦車我來弔古祠林下黄鷂驚飛過故墟成子欽治堂濟陽私第鹿庵題曰晚翠諸公有詩命題其後子欽時為忻州尹園花灼灼暫時香鬱鬱相期晚節昌根本百年隨徳種枝條千尺拂雲長自應春意回天地未省人間有雪霜飲爾髯龍一杯酒與君同醉子欽堂濟寧懐古時被水害四墉形勢宛如鷗𣺌𣺌寒波湛不流屈室半為魚鼈窟荒臺還有鳯麟洲漢時鳯集於此春秋西狩獲麟即其地也文廟有碑紀象蒼茫不曉神明意横潰恐防風雨秋遙望徐州喚蘇二一樽同此賦黄樓一鍤疏壚即湧泉四圍廬舎極深淵功思大野乗橇日灾記黄河沈去聲璧年流惡既非歸潤下懐安惟恐失機先富家巨室多名士乞讀盤庚第二篇林廟有感呈致道諸公時襲封未定遶郭荒山即四鄰欲尋遺跡問耕人蒼麟卧畔三陵古老檜灰邊萬木春道統何嘗亡世祀聖門自在有忠臣人心不死遺經在顥顥青天日月新正月十六日宿徘徊村邢居中别墅村多邢姓佛寺有隋開皇中碑隋來千載㡬興亡譜姓依依不出鄉桑梓田園有餘敬柴門煙火澹相望殘隄漫指黄流道斷碣猶留古佛堂二字徘徊不經見别稱邢氏讀書庄漢昭原廟號徘徊無亦此地曾建原廟乎故地以此得名然亦未見出處以俟更考司業趙季明南歸索詩為賦玉虛壇畔馬頻嘶風景蕭蕭入别離傾蓋相逢如昨日急流勇退見今兹太行盤谷昌黎序倦鳥歸雲靖節辭但恐無容遂髙卧蒲輪重起不多時夏日退齋書事衡門豈敢號潛夫野服黄冠樂起居瓿上𤣥文天地理橋邊黄石帝王書水非有意為行止雲自無心計卷舒幸得抱貧俗客少矮床髙枕即吾廬有懐憶從垂髮失先人保抱攜持萬苦辛三徙終蒙黄卷力百年不假白頭親嘗其㫖否嗟何及生我劬勞是此辰除著全歸報全徳敢忘冰蘖奉遺身十月朔有懐號凍啼寒恤犢禽晝勞井㸑夜紉針乾坤莫報生成徳霜露何勝悽愴心錢紙寒衣十月朔椒漿薄奠九泉深今年不得身親事遙望松楸淚滿襟寄贈鄴下顧良輔時建三皇祠二陸當年讓顧榮鄴中還喜得雲仍文章自有八义手事業又聞三折肱霧帳香濃朝搗藥雨簷花落夜挑燈遙知報本崇祠宇欲薦溪毛惜未能何恵從親按察山東於其行也乞誨言詩以贈之衆中恒羡汝惟勤不惜忠規惜重分聖學一傳堯舜禹人生三本父師君持身切忌欺心事下筆當為載道文聳壑昻霄吾未老他年日下看卿雲丁亥二月十二日夜夢先妣宛然如平生覺而思之兒在於此豈吾母逺來視之耶即取酒南望一酹不覺涕泗交下感而成詠松楸拜别淚如泉回首飛雲隔暮天悽愴焄蒿來夢裏温慈言笑只生前十年母逝兒空憶千里兒行母在先三釡雖榮欲誰事結廬歸去守荒阡讀吟嘯綱常為重此身輕耿耿丹心炳日星自許唐臣有巡逺不知漢徳厭桓靈九原忠血應成碧萬古英名足汗青讀罷六歌魂不定江風浩浩雨㝠㝠胄學端午感懐萱堂晨起静無譁和氣熙熙自一家新婦白團薦甘蔗小兒玉雪抹丹砂藥函預蓄三年艾石燼匀舂百草芽死不相逢生又别繞階愁看蜀葵花老母以陳石灰和百草芽是晨不語搗之治金瘡施人餞邢君祥少府之丹陽馳驛飛軺舊使星丹陽人記見來曾盤根初試青萍劍狡兎難逃白錦鷹禁盗雖然尚威猛得情先與到哀矜隂功别有神仙路平地烟霄第一層自况四十三年一夢驚昨非今是㡬程程衰容無鏡不自覺病眼得書猶强明時輩頗知哀老子兒童盡解識先生茂林幽鳥誠相羡茅屋三間計未成頭陀小李禪師以玉簪花為菜且作詩命其鄉人吳助教文卿復乞詩於成均諸公亦為繼其後探得囊中飡玉方牙盤瓊箸喜新嘗鹽華不改娟娟色酥液輕凝澹澹香氷雪仙姿換凡骨乾坤清氣入詩膓為招珠履三千客更挽銀河薦一觴明倫堂前手植竹三數本灌溉以時森然玉立今移居東齋恐負此君故託政卿直學為之記云明倫堂下竹猗猗盡自唐溪手自移競釋褐衣春後筍髙搖金鎻月中枝嵗寒正我泮宫客風度宛然淇澳詩鄭重西隣董夫子為予時復一霑滋鴈字分韻得雲字二篆才翻又八分錦牋遙借萬重雲行低古木揮椽筆影落澄江拂練裙逺帶霜來先報信忽隨風斷亦成文野鴉何事孤村外亂墨紛紛㸃夕曛方鏡自來寳鏡象天圓誰毁為方烱烱寒雲母几屏晶透影琉璃仙井玉生瀾四邊曾説神仙到千載長羞佞者看掛向髙堂如有語此君堪與正衣冠思歸回頭六載别中山依舊虀鹽一冷官鬚為不純飜鑷黑顔從止飲却成丹年光到老常疑速世事諳多愈覺難好在明倫堂下竹余手植也殷勤傳語問平安用韻答昌道奔走黄塵豈素縁披雲還喜見青天論詩不落正始後談道何妨太極先千里相望有今夕一言纔出即同然却愁明日扁舟去依舊羈忩抱病眠朝宗宗道見和四月六日偶成以答不識春歸底是家日長深院駐韶華西行竹引六七笋南向葵開三兩花藜藿厨香公退食琴書客至吏收衙雨餘陡覺公私辨青草池塘處處蛙寓居一日即吾家風有餘光月有華周子不除方長草堯夫偏喜未開花智能羅織蛛成網分識君臣蜂報衙有難愚疎揮使去水濱君自問鳴蛙答和㓂曹同舎見寄詩韻短檠風雨嵗連宵日月駸駸莫我饒陶令折腰羞五斗馮唐白首厯三朝人情冷淡家如客世路﨑嶇近亦遙濟上雲煙肯分恵伴君歸隠不須招日月東西晝復宵蕭蕭白髮肯相饒百年人物誰鐘鼎萬古乾坤一市朝莫著龜鳬較長短須知鵬鷃各逍遙山間曾聽漁樵説只有巢由不可招奉和前韻以答朝宗且喜衛君政卿之治療李君昌道之欲來頭白眵昏尚綴文惟君憐我我憐君一官何苦勞為病四體初傷幼不勤藥石幸然非楚逺簫韶兼喜至齊聞柴車未便匆匆去矯首匡山待紫雲八日冬至五更燈火短檠光飣餖杯盤芹藻香璧水絃歌周雅頌昌黎學解漢文章丹心不逐浮灰動白髮從添一線長聞説書雲足佳兆南山遙祝萬年觴送撒尚書還維揚時與先君立墓碑揚休山立漢朝驚壯嵗規為已老成西北人門都護府東南財賦地官卿九原馬鬛封先徳千古龜趺著大名准海維揚照金紫故鄉楊柳若為情留别曹府幕聶道亨詩筆清新藥石工公方難得更明通紅蕖灧灧浮波月玉樹琤琤動幕風千里相逢傾葢底百年交分舉杯中無情恨煞離亭柳又喚行人馬首東餞彦文都事之西省幕妙年檄䑕已風生悃愊無華近老成兩省賓僚雅相望二難兄弟自知名秋風鞍馬南山色和氣樽罍北斗城婉畫清規蓮幕底碧雲西望正含情送人赴建康幕金陵王氣逐飛塵玉籥麟符此重分藩帥爭迎㢘叔度幕賓今得郄㕘軍離情渭北春朝雨望眼江東日暮雲塗炭生靈待經濟勒移休誦北山文嗣能司業遷衢州倅詩以送之千仭龜峰壓石潭星分吳越更東南驥當别駕才方展鴈忽離羣思可堪潮上錢塘供壯覽山連禹穴快竒探政成莫惜歸來早要續松牎雨夜談崔子由蔡州倅崔自太子家令典簿出倅壯嵗恩霑少海濤智囊儔侣盡英旄龍光半寄分茅重馬首遙瞻懸瓠髙麥藝新田屢豐稔鴈迷中澤尚哀勞下車政要如膏雨莫倚河瀕羡桔橰餞翰林掾郭伯紹任密州倅十載抽毫侍玉堂簿書公案盡文章起身得郡人亦少洗手作官儒所長杞菊尚存坡老賦園林重訪鄭公鄉賣刀買犢真佳政要使千家粟稻香賡韻復寄昌道揚休山立復温文談席長傾列國君兩得音書見風采㡬時杯酒接殷勤同聲已許心相契密語先愁耳失聞只欠容城劉老子禹臺西北望燕雲送林星翁南歸火化青囊為乞靈鳯凰音吐鶴儀形虀鹽推我空箕舌方術憐君是嵗星卜肆何妨隠都市移文還恐勒山庭仙翁許借東南地碧水丹峰如畫屏翁今號丹山驥龔其名玉簪花膩葉寛團翡翠裠柔絲細吐麝蘭薰無瑕態度呈孤潔傅粉肌膚瘦十分瑤砌古苔虚夜月石盆寒碧浸秋雲北窓一枕風如水鼻觀長從夢裏聞奉和朝宗見贈詩什尺書西去三邀我疋馬東來重惱公清淨樂聞談治道雍容相對滿春風珠璣自覺形容穢草木惟知臭味同白雪陽春誠寡和願分餘韻佐絲桐奉和昌道韻陶雲出岫本無心敢望商巖雨意深十載冷官誠苦節萬家名邑可甘臨陽和自與春風約壯志爭期老病侵早晚羸驂謝羈鞅依依豐草滿長林二月十三日雪朝宗以詩見寄用韻以答餘寒尚欲妬新春雲與青天黯不分病枕但驚風淅淅破窓還透月紛紛數莖鶴髮羞相映一夜蠶聲竟不聞載酒何人過揚子借明應草太𤣥文昌道以詩贈行用韻留别絶塵逸駕許追攀黙意非於好處慳神武掛冠傷老病龍淵得寳不虚還清風許我羲皇上白雪誰居伯仲間西北髙樓出雲表擬從明日望匡山留别伯仁一贐殷勤抵萬金中年哀樂惜分襟不慙花笑潘安鬢賴有雲知陶令心羸馬蕭蕭悲逺道髙城杳杳隔疎林預愁門外東風起一夜相思栁色深竹古人移居亦種竹不可一日無此君髙節要從秋後見細香冝向静中聞冰窓碎冩溶溶月雨砌微生澹澹雲雖道清風兩竿足淇川幽趣已平分東庵即事東庵瀟灑似虚舟心自無塵境自幽晨几誦餘還冩字午窓眠起更梳頭敦仁安土真成愛知命樂天奚復憂更約懸車王憲府杖藜來往亦風流一室無喧事事幽微軀此外更何求兒童縱懶勞當付官業雖卑病可休種竹固應聊免俗樹萱今已久忘憂區區田舎從人笑卧看元龍百尺樓蓬蒿三畝屋三間風景蕭然晝掩關幸得青編遂真樂故將蔬食博清閒烹茶品第連家井開牖招延近郭山可愛幽禽解人意一雙飛去復飛還三徑長思寂寞濱一區鄉社為予分挂冠今擬陶元亮攜酒爭過揚子雲當户幽花呈異見窺簷好鳥薦新聞澹縁不枉鄰蕭寺盤饌經旬不茹葷謝和武略益墳地吾家自髙曾下世為中山人貞祐南渡者二十年北歸丘壟如故蓋千户祖考以桑梓之舊保全之力也今又承益地之意因勉賦以答萬一云吾家百指昔顛連一渡黄河二十年故里歸來滿秋草數丘依舊卧蒼烟保全厚徳傳三世栖息幽魂慰九泉幸頼恩光立華表敢求餘地益荒阡寒食過外家墓草逕曾行拜掃車衰林猶吐向時花自慙陶侃承賢母痛恨王符絶外家雨塌荒墳棲狡兎日髙殘奠下飢鴉兵餘何地宗支在獨對碑文涕淚斜到山家逺訝雲間雞犬聲澗横獨木到柴荆牆頭逺岫朝暮變石上流泉冬夏清過客疑仙人不識隣翁邀飲酒初成重來只恐不知處若隔桃源行路生乙酉暮春偶得詩禮誰傳大小儒緘縢可快負囊趨同方殊用不龜手㡬死得生編虎鬚吹籟衆風從自響澄霜秋水澹如無忘言獨倚蒲團坐儘付傍人笑我愚口號呈鄉中耆英鏡中鬚髮雪毿毿不覺流年五十三時不相饒誰再少樹猶如此我何堪宦途奔走塵空眯鄉井歸來水益甘一曲髙歌一樽酒東風花鳥喜東庵得一見和復答之亂紅灼灼緑毿毿三月韶華又復三甲午嵗清明逢上已耳重眼花衰可奈詩壇酒陣老猶堪歸來方覺行途險忙後尤知閒味甘㸃檢舊書還舊隠山英應不厭東庵復和前韻鬢髯古貜漫毿毿暮四生涯朝復三退聴浮生元有定過求造化恐難堪呶呶徒落耳根重黙黙還知舌本甘不識此言為是否問渠印證老東庵呈徳固書帷政與賞音期衰病其如素願違知足便從今日足覺非何止昔年非孟光解與梁鴻隠稚子應思陶令歸鄭重唐溪溪上友臨風先為晒漁衣乙酉六月十三日呈西門直卿時公痼疾未愈深居簡出方食不欲聞人聲百年金石憶神交不是柴門無處敲屋上棲烏聞好語牆頭新竹軋晴梢庖厨苐恐妨君飯褦襶將渠為我嘲咫尺秋風掃殘暑一杯聊作續絃膠與西巖諸公尋真率會馮西巖劉房山張嵬山西門筠菴嘗取洛陽耆英故事作真率㑹三十餘年不復見矣一日偶覩嵬山遺藁見所謂真率㑹序感而作詩且告同志以尋盟遶郭青山似洛城百年人物見昇平短童隨步衣冠古大字横經几席清誰復尋盟㑹真率我慙無傳紀耆英舞雩留在清風地好著餘芳乞後生奉寄徳固正卿二先生聞二老有言秋色南山氣未平誰憐淺月伴長庚昔年青佩新交友今日華顛老弟兄難著千金買親舊能消㡬屐過平生何時一勺鄉中水細話悠悠世上名寄直卿一謝鏖鏖塵市喧喜君病愈愈加餐五車書史古人友三畝蓬蒿天下寛世事飜騰新様好交朋零落舊盟寒澗阿留得碩人在千古清風詠考槃與無極尹馮夀卿東齋夜話次韻贈别風流人物見昇平傾葢相逢覺眼明四海芝眉嗟晚識十年蘭省喜先鳴陽春白雪詩家語流水髙山徽外聲别後難忘只今夕對床燈火話平生太原逯君澤畜南冠養之而不責價携卷乞詩明窓展卷一欣然誰道書生不直錢舉網誤拘鯨出水開籠却放鶴沖天浮屠還有青公序晉産今知逯子賢明日扁舟故鄉路依依江月向人圓

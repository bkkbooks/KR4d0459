body:
  text: 提要東菴集四卷别集類四元臣等謹案東菴集四卷元滕安上撰安上字仲禮定州人以薦除中山府教授歷禹城主簿徴為國子博士轉太常丞拜監察御史以地震上疏不得逹遂引疾去尋起為國子司業卒於官元史不為立傳其事實具見於姚燧所作墓碣銘且稱其敏修篤行學積其躬道行其家化及其鄉而吳澄文正集亦謂安上為人乃有學有行而有文者蓋亦束修自好之士也燧又稱所著有東菴類藁十五卷江西亷訪使趙秉政板之行世又有易解洗心管見藏於家而焦竑國史經籍志乃稱安上東菴稿十六卷與燧所紀卷數不合當由未見原集而誤近時顧嗣立作元詩選搜採至數百家而安上之集闕焉則其佚久矣今從永樂大典中裒集編次得詩二百餘篇分為四卷其詩格以朴徑為主不免稍失之粗獷而筆力健舉七言古詩尤有開闔排宕之致視元末穠豔纎媚之格全類詩餘者又不以彼易此矣考蘇天爵文類載有安上祭硯司業先生文一篇而姚燧亦謂其文一本理義辭旨暢逹不為險譎非有禆世教者不言是原集當兼載詩文惜永樂大典僅存其詩其文已無可考也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:42f81135865ed8c81ac1722b3a2d9994daea7ae57ed6a4dbc33ea7698160fd75

  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0459_WYG_001-1a, image: WYG1199/WYG1199-0494c.png}
body:
  text: 東庵集卷一元滕安上撰四言詩至元德音詩并序至元十九年四月十八日中山府儒學教授臣某從庶官之後伏聽德音條凡十五每讀一訖咸以手加額踴躍歡抃如獲更生既而使臣孫某徴詩某職在儒學不敢以蹇淺辭竊惟明世不能無佞而能去佞聖人不難得民而難安民和萬邦而黎民時雍去四罪而天下咸服此堯舜所以為堯舜也惟聖朝接千嵗之統惟皇帝大四海之圖去姦佞擢賢良下詔條安百姓天地之仁推之而愈宏日月之光廓之而愈明於戲休哉誠登堯而軼舜也太平之期臣幸親見謹拜手稽首而為之詩溫溫德音敷于下土癃老黎庶是蹈是舞德音惟何天子神聖姦讒蒙蔽咸革而正讒人罔極竊弄威福負且乘器凶以覆餗林甫剖棺𢎞羊既烹百僚稽首天子之明乃命元老載謀載惟有積其弊以新以釐命相選賢允協帝心鰥寡無蓋式昭德音姦事箕斂民多逋畝天子憐之貰租已負姦事羅織民罹慘酷天子憐之省刑綏獄養老恤孤和鈞平價次第舉行彰我王化琴瑟不調解而更張四海熙熙躋于一堂惟我天子萬夀無疆皇皇有元古無比隆浸以唐德扇以虞風惟我天子垂祚無窮地平天成風恬俗熙臣今何幸乃親見之拜手稽首獻此頌詩五言古晨起樹色暗曈曨雞聲動棲鳥浮雲淡流水時見衆星小虛襟皓氣盈獨立萬物表詩成望東方陽輝破清曉擬行行重行行行行重行行溪邊草離離是時新雨霽浩碧無津涯中州有佳人音問兩不知我欲駕風濤恨無青竹枝舟行恨波緩泝流愈云逺思君重思君詎作乘興返感彼芙蓉衰嘆此嵗已晚君家有雕胡為我炊一飯擬青青陵上柏青青陵上柏坦坦溪側石為問釣魚人曽見行吟客我家有斗酒雖濁未為薄向在聲利中釀法得京洛荆布為我熟待豫不時索幸君共一觴同此泛家宅漁人如不聞絲綸整千尺回舟入風煙可望不可迫擬今日良宴會今日良宴會溪山入橫陳非絲亦非竹足以怡心神座中有佳人氷雪含天真霞衣風杲杲紉蘭佩申申莫惜此夕樂但恐此迹陳君看牛與女逺隔銀河津雖有七夕期終嵗長悲辛題贈禹城紀敬叔紀侯大去國聖筆示甄奬後昆炳遷史風義愈森爽迄今雲礽孫孝弟甲鄉黨仍以資算髙推擇掌內帑金錢富漢文貫朽不可繦手目無權衡鈞石校銖兩寵監平原稅去家間尋丈孰云弗為政足佐一邑長可以得俊彥可以抑貪枉瑣瑣龍斷夫貨利左右罔為當痛繩檢使泚發諸顙百里昔隱市干木屈大駔為當重拂拭庸受進賢賞除租免農器良務農業廣又當潤澤之力本遂均養朱邑一嗇夫桐鄉尚祠饗職豈擊崇卑遺愛即慕仰春風遍山東浩歌歸擊壤稅司除蠶征為賦周官設司市蓋抑商夫貪法每優農人俾治畝東南漢末事管榷利孔開窮探黠商操竒贏疲氓困鐫鏨繭絲至縑帛一甚矧再三孰憐始作俑迤邐及卵蠶古人樂仁術肄業慎矢函嘗逢鶴髮翁典故云飽諳鎡基與經籍不與百貨參迄今用其一無乃異苦甘聖朝化更張治古無人慙錢榖靳髙選秩重伯子男有來兩君子勿疑朋盍簮張侯嗜理學語孟入泳涵末得張潤甫家世青出藍安坐一務中心迹如禪庵首罷卵蠶稅喜氣騰晴嵐昨間日中市珠禇盈負擔萬家鳴機杼衣易懸鶉鵪遐想挾纊人禱頌將何堪鎡基倘隨例悠久播美談辛已九日張居實坐中插籠金菊索詩賦此菊花如隱人東籬遂幽屏黃裳信元吉中美恐彪炳鮮鮮絳繒衣衣錦復尚絅相對淡以文晚節愈間靜老鬢不堪插瓊杯照疏影淵明今已矣芳盟復誰領長吟思悠然姢姢風露冷題鈍軒祖墳遺安亭燕山屹岥岮喬木參秋旻髙亭表遺安八世趙氏墳時時下馬人能説爾祖勤買田事歸耕妻子前鋤耘種德及黃泉枝葉何繽紛振華得秋實倉庾豐以殷舂瀹供饔飱精鑿絶羶葷逺辟危亡憂坐收安飽勳七傳逮建春三聘辭玄纁煮薺看青山橫渠詩折腳鐺頭烹白薺蓋頭茆底看青山富貴如浮雲于今鈍軒翁一門奉嚴君百錢日計了僮僕猶欣欣旦暮示庭訓先戒恆云云勿露修月斧勿逞運風斤袖中有金鎚不戰揮三軍隂功晦愈彰麟鳯超人羣孫安祖亦安輝光賁榆枌纍纍百塋域依然龜兆分詎必禁樵蘇劫火不敢焚嵗時登牢蔬倣佛聞蒿焄鹿庵玉堂仙大書擢蘭筋左山記其端噩噩商盤文於戲其守之曠代揚清芬題張詹事子有遂初亭蕭散物外心黽勉天下事古來賢逹人二者恆一致如方為霖時已寓淵潛意所以荷大任殊不動聲氣張公江海客未害廊廟器雖當萬鈞重中無一毫纍退食自委蛇喧寂非易地乾坤一草亭况此華構邃濁醪有妙理黃卷足真味而我豈不知開筵八珍備蓋喜稷契徒共講唐虞治遂初復遂初吾初久云遂魚泳鳥雲飛遙應識髙義登塔巋然古靈光閲世如吹毛火劫幾焚蕩基制仍蟠牢始為耳目役頓失陟降勞盤盤出上方萬象供竒叨左餞虞淵烏右顧歸塘鼇舉瓢接雲漢醇然玉色醪不飲亦自醉烈烈風生袍拂塵睨仙迹蛻在龍蛇逃上有東坡題名被僧刋去諦視方見想見下筆時勢與西山髙君看青天鶴一鳴應九臯不見隨陽鴈哀哀下空濠側足焦石原山林笑吾曹安得生羽翼髙飛弄雲璈東庵新居六首五世家中山誠云父母邦失宅困移居栖栖四十霜鄉人苦相愛出錢營草堂衆手治荒蕪樹板補垣墻東西十餘步延袤亦頗長因陋成三區為庭各求方前庭設荆扉修槐緑成行後庭就西舍足可安匡床井泉在中庭蔬畦圍齋房先生居其中侵晨起徜徉櫛髮臨清風曝背迎朝陽散䇿有小徑展卷有晴忩好意亦素定仁教名吾坊我當以仁教青青聚襟裳不惟報鄉人生理貧可常雖無饘粥田束修供嵗糧植蔬比未成芽本供盤嘗豫為衣綿計擬樹墻下桑招我出贅弟共此荆花香糲食味自甘舉案對孟光大兒但讀書不必能文章小兒期勤力雖愚亦無妨况吾坐早衰難勉筋力強翮六素所短龜六幸有藏天許汝安居詎可徒翺翔終焉遂間燕百慮淡以忘我生仁教西今居仁教東長年幾五十盤桓一里中神祐不吾薄幸兹保始終杜陵浣花上竟致草堂資堯夫安樂窩殆遍洛水湄而我何為者安居今有兹閣板架琴書溪毛薦宗祠慨嘗感古人君子耻獨為安居固所喜亦喜鄉風移平時與吾親僦屋寓窮微棟宇髙於牀煙煤滿麻衣舉翮觸四隅如鳥不敢飛於焉得兹堂寬足安慈幃吾親復不待恍然昨夢非掃壁挂寒影載拜徒依依苒苒老將至兒輩長我如遺安非不知作室職在豫鄉人識此心購兹一室虛衆心匪豫敬諒敬詩與書老我住幾何行當付諸渠此宅起梁氏作者猶弗居爾曹當慎守母亡經搆初淵明千載人出處與世疏有詩猶且云吾亦愛吾廬晝日掩柴户不聞㕓市聲掃地坐焚香雖飢心亦清飛鳥遺音影偶悟身外名誰能同此意有酒為爾傾酬友人惠斑竹杖並檳榔杖二首亭軒入秋氣熟寐快清宴有人不知名折節求一見頭角頎而長青襟紅錦緣問之從何來自言淇水縣願言入君手結盟終世眷君危我必扶我失君可援夙塵膚受汙賴君為濯濺嵗寒心似鐵治亂身如箭如何兒女淚不屑被顔面本自質有文繪事素以絢聞之喜不勝如掃城濮戰敲門忽驚起耿耿有餘戀友人斑竹杖千里遙相薦鄭重夢中言君子當豹變懦質殊早衰五十鄉已杖仍病須藥物如南土畏瘴長思兼二美少益筋力壯或將檳榔杖逺惠老詩匠刻作古竹根無異天成狀座中轉貽我甚慰夙所望左右相扶持此友獨可尚嗅之病已瘳丸劑今匪仰性癖厭騎馬離羣任嘲謗緩曵聲鏗然所適自酣暢興來陟巉巖得爾不惆悵龍脊瘦插地隨坐屹相向趙克敬倅孟州彬彬廣漢孫蚤嵗掾東觀追陪麟鳯羣簿書亦文翰丈夫任胸次不必峻風岸初筵佐名郡詳練如素宦及親三釡榮况乃千石選王屋山水窟河陽花栁縣佳境自人勝一待精彩變賢守郭細侯賔僚偕月旦時守郭姓判許姓我公居其間談笑能事辦城下古黃流渾涵泥滓半莫示投膠手且容漁汕汕久客難為情仍堪續離宴樂我新相知人生幾會面側聞樹美政可當長相見伴讀楊觀謙逢吉告歸平定省覲索詩觀謙監丞王嗣能之甥西山有佳人具慶復具慶之子駕言歸兩年闕省定乾坤推三樂不與封千乘萊衣舞斕斑日月恐難更古云五十慕况此春秋盛胡為事逺遊舍邇趨蹭蹬豈知賢父祖飭學奉諄命雅期逺大業恕責朝夕敬况自親舅氏虎闥本文柄青春去弗還隂辰當與競言言愧非才敢不圖報稱思來見夢寐家山動歸興我亦忝師屬庶竊一言贈吾道亘古今坦坦非曲徑欲熾迷同然智鑿失真性仁義推四端孝弟先百行又虞公私間側手隔凡聖體立貴有用弗預安猝應文章匪空言要在理為勝汝幼知楷書萬事師筆正器豈例晚成致功咸自靜莫慮無範模開卷覩孔孟亭亭法權衡淵淵古鐘磬稜稜莫邪劒皎皎軒轅鏡政自不求售何憂不為政雲衢直如絃東風翮羽徑持此介眉夀可並甘旨飣答趙景文學書少真積頭角闖不完真積嵗云久尚恐桔蛇蟠一旦灑然悟飛動傾毫端非讀萬卷書索悟良獨難玉溪翰墨禪妙出畦徑間蹙踏元氣開豁落萬化間我雖不解書鬼眼不受謾水落見秋岸雲靜開晴山二趙倣坡谷三變栁與顔君得此中趣髙價後會看相寄擘素箋蕭蕭風雨寒送王文琬鎮幕秩滿北行我初識文琬風骨鶴軒軒三載幾會晤愈見圭璧溫文彩照羣彥畫諾資名藩小婦哭不哀一聞申夫寃握筆辨公是疑獄多平反祿位豈在髙有為名節存秩滿事行役與貧俱出門長安桂玉難何以度朝昏政須囊中金愧惟贈一言慷慨行所學窮達安足論有婦毒其夫王察知之

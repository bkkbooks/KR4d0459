body:
  text: 東庵集卷四元滕安上撰七言律二月二十八日元帥劉公生朝冠蓋歸來鬢未絲繁華留在嵗寒枝襟靈一點畫前易絃詠數聲言外詩二月春風滿巵酒百年神理即金鎞千金為夀非為晚敢負先公第二碑郡侯生朝四世三公仰漢冠妙齡劒佩侍龍顔風鵬一舉三千里天馬初離十二間燕寢清香歌吹底春臺和氣笑談間欲知嶽降生申甫只此恆山是夀山徽州總帥趙公亮豫同舍也至元十七年夏六月北覲回過家拜親適值生朝席上賦此為祝膽氣堂堂正妙齡元戎誰識是書生彩毫落盾風生檄碧幕談兵月滿營壁壘雄屯龍尾嶺徽州山名樓船曾扺石頭城夀筵天付調羹味拚醉黃梅細雨聲是日有雨終日五月一日林君一省郎生朝雲海光芒插玉虹煌煌明月出珠宫我於髙户一日長誰與阮瞻三語同瓊樹影連仙李畔其子阿外新與京教李庭訓結婚紫薇香滿夀杯中鳯池近在薰絃底長醉千年解愠風王直卿具慶八十槐幄濃隂百畝垂又將隂德致家肥春秋八十到能幾父母一雙齊更希額上風流爭點筆膝前愈婉不勝衣千年嶧嶠和鳴在要看雲礽次第飛户部主事濟南任從善父母俱八十以卷乞詩賦此鳩杖相隨步履輕綵衣兩兩候階庭隂功家記傳三世具慶人榮近百齡石上流泉寒更逺城頭山色晚逾青吾宗舊與諸任齒會復登堂過厯亭懷孟總管宋侯母九十詩卷時總管亦七十矣覃懷邦伯奉庭闈九帙康寧古亦希為子三遷軻母舍李野齋序云夫人攻苦食淡教子有法行年七十老萊衣春生夀斚雲腴軟香滿蔬盤雪笋肥嚮日雙雛今六翮太行長伴白雲飛按察趙公八十得謝作詩以慶五朝佐命舊衣冠名遂功成故里還北闕辭情章奏裏東門祖道畫圖間雪霑峯頂山非老雨遍人間雲始間父子一家榮萬石仙春堂名日醉舞衣斑覃懷靳子安聖上潛邸時太醫也至元之初授本路總管以榮其歸時年七十矣今其仲子士約由兵部侍郎總管衛輝以便養親適其父年開八帙將修慶事以翰林李野齋之序乞詩故為賦此晝錦歸來又十春鏡中風度愈溫溫人生難得五全福天下共推三達尊疇昔刀圭誰國手祗今蘭玉遍君恩兵曹近領河平節省謁恆看耀里門鄉人楊君寶夙喪所怙母遂著黃冠以育遺孤君寶四十尚未有後母年八十有三修厥慶事是日始舉一子繼而復得第二雛以卷乞詩四首鶴髮孀親八秩過含飴未慰奈渠何方酬孟母三遷意遽詠徐卿二子歌天理人心元未逺靈椿丹桂樂何多我悲不得留風樹空使門生廢蓼莪百嵗髙年遙可到四知餘慶逺仍存月中丹桂今過母雲外靈椿别有孫竹馬青衫白晝永黃冠野服古春溫仙家自有丹砂術要看雲來萃一門出家初不閡家居懿範風流見婦姑百嵗間身萬緣足一兒進杖兩孫扶案頭經卷膝前筆竈底丹砂掌上珠寸草春暉常好在殷勤返哺看林烏竹馬鳩車鴈作行白頭老母百憂忘柏舟風外冰霜苦萱草池頭日月長却老靈符蒼水佩介眉春酒紫霞觴諸孫早辦讀書計要與新詩實錦囊題趙中丞母八十夀卷序周止平為之言中丞少孤父舊為邢州節度使當襲爵同僚欺孤幼欲奪之夫人攜公兩之和林竟得故物且用翟方進事八十風流聖善姿雙瞳如漆髮如絲昔攜孤幼翟方進今樂平反雋不疑雲暖蟠桃春色醉日長慈竹午隂垂一作遲無窮富貴無窮夀莫忘風沙萬里時風沙萬里序中語也和千户武略太夫人夀閏年閏月百年深蔬素平生見善心體健階前長曳杖眼明燈下尚穿針侵凌雪色萱難老擁護春光桂有隂純孝誰如和武略事親不戀虎符金晉州趙德明母夀八秩翰林諸公有詩并序又七年余過晉母尚無恙出其卷求詩故為賦此諸子相看雪滿顛諸孫還又到曾玄北堂萱草渾前日東觀芳詞欲十年堆案餘飱饜鍾愛過庭嚴訓助真傳滹沱佳氣恆山色長在斒斕舞袖邊趙鈍軒七十夀回頭六十九年非利鈍相忘久息機天理自應仁者夀人生到此古來稀韋編不展談如綺竹杖橫拖步欲飛二月河陽花滿路子孫迎舞老萊衣其子克敬時為孟州同知約春迎翁馬丈九十夀八秩曾吟慶夀詩風神愈健向來時秋霜不敢欺青鬢春酒還宜介白眉鶴算定期千載逺熊占何怪十年遲誰言日月催人老緑水青山自不知夀布呼密平章十一月八日萬斛舟航艤巨川上天瑞世為生賢蕭曹豐沛逢佳會房杜河汾得正傳心自寬和終長者黃霸傳事還清淨付當然一杯冬至前頭酒願輔承平五百年一杯冬至前頭酒一作一杯春信梅花露夀集相秀出隂山敕勒川一陽初復得春先清時一遇當千載白日重看上九天為相最難知大體致君有效是豐年一杯併為斯民夀三復緇衣詠好賢挽史宣慰章公將家子風流藴藉不減前輩威肅三軍而臨民有惠愛嘗葺軒私第名之友松命豫記之從遊齊魯登泰山臨日觀感念疇昔情見乎辭香凝燕寢笑談清不害胸中十萬兵襦袴競歌廉叔度鞬櫜能世李西平荒煙宿草悲仍在白露長松淚亦傾無復泰山山頂上四更同看火輪生挽侯宣慰伯祿章鐵面威稜見妙年老來襟宇謝韋絃春風曾接程明道公嘗事魯齋甘露爭無黃頴川至元辛卯正月二十六日僧格敗復舉用舊人公已逝矣萬里盡歸榮辱外幾人能得始終全回思話别橋門路只是當年已惘然追挽西巖先生馮公落落風姿七尺身一家三世躍龍津恍然白蟻驚殘夢惟有青山對故人吟屨徜徉名利外酒杯陶寫性情真門生三十餘年後始悟西巖是逸民題蓬軒吳先生挽詩素臣凡例擅東原筆底文章德有言霜露遽凋三桂樹乾坤空老一蓬軒塵封遺藁誰家屋煙卧孤墳何處村什襲送行詩卷在知君猶慰百年魂挽教授仲祥詩僕自十月二十七日卧病君日來問之臘日忽聞君訃音僕不勝哀慟恨不能起而臨奠也故作此以挽之君平生得胎息法嘗自與仲通李君言其效云我病憂痁口挂牆君來日日慰悲涼昔嘗愁我先君殁忽不期君棄我亡善惡無從論禍福虎龍莫誤撓隂陽退齋雖乏凌雲筆敢為知音作誄章土堠賈慶之挽章臨終囑後事沐浴易衣冠了然不亂繞籬桑棗緑隂成插架詩書金滿籯且學且耕真永計忘名忘利亦髙情處喪自許隨貧富聞道俄能一死生未及識君君已矣舉杯遙為酹佳城挽石振元去年被召赴燕山相送區區北出關先正碑文將厚意臨别以先丞相碑文見惠故人情話慘離顔驚聞倐忽成長逝自愧愚疏尚未還一束生芻一壺酒臨風遙奠淚潺湲驚聞一作聞君自愧一作愧我李漕仲常挽章善篆字相聞長恨昧平生從到京華衆稔稱鞭算於今幾劉晏字書異代兩陽冰方思末契託非晚遽賦哀章感不勝何日西山山畔路一杯下馬酹君陵挽石巨源賢相無由起九京賢孫名又到銘旌家傳萬石元醇謹學苦十年近老成樽酒生芻有今日藝窗連榻憶平生清秋抆淚豐碑下老木髙聲動哭聲楊德卿哀挽膏肓二豎巧相嬰百藥扶持竟不靈彩筆遽傳鵬鳥賦白頭空老太玄經傷心精爽委朝露屈指故人如曉星蕙死蘭枯天莫問東風荆棘漫青青挽李兩山兩山奉使交趾以功授浙西道宣慰考滿赴調歿於京旅殯文明門外南禪僧舍昔年曾忝共賢關俄請長纓使百蠻方喜于蕃稱治最豈期到闕復尸還清風烈烈垂千載明月蕭蕭空兩山可惜功名心未了鏡中才見鬢毛斑挽趙和之不解褐衣為養親豈期親歿即亡身黃泉子弟塵生面白髮交朋淚滿巾蒿里棺衾千古夜花亭詩酒去年春自慙無地酬知己外傳終當絶故人挽夢吉天才如水氣如霓千里真堪一息馳幼嵗襟期希聖解暮年志趣和陶詩意長日短終成恨病與間宜匪好竒幾向西齋同夜宿微言還有故人知挽袁善長沈雄氣岸復溫文孝悌傳家先日聞方冀一門成九世豈期八陳失中軍芳馨永播髙陽里皮骨猶空冀北羣遐想幽魂烈星日尚應灑血戀孤雲昆季八人歿時母尚在焦祕書挽章焦致仕李野齋作序餞行詩未成卷公下世因餞卷為挽詩瘴海冰天扈六飛獨將忠確結君知修書麟閣有此老繼迹鹿庵今復誰序中言鹿庵致仕後公為第一人自是玉樓傳詔早未關神武挂冠遲士林憔悴相逢處忍寫離詩作挽詩題庸齋楊春卿挽章詩卷玉田種玉玉無瑕經有顔淵筆有花共道西河似夫子更憐東閣在貧家蛇蟠寶鏡人猶嘆鵬上承塵日已斜一代廣文官獨冷春風留與紫蘭芽五言絶句自適二首菽水聊為養清晨一笑開萱堂惟此子國豈少人材淨几明窗下周圍萬卷書拈來只論語此理已無餘七言絶句村居招教諭真學幽居一日勝兩日故友十人無五人村北樹隂餘畝大肯來盤礴樂間身劉叔端所收何局長澄四皓圖嬴舍扶蘇鼎已顛漢髙不戒覆車前山中自有幡然意聊假長安辟穀仙出處無心繫所遭是非於我等秋毫誰教盡棄人間事方許商山萬仞髙東齋夏日睡餘清齒借茶杯吟玩間書掩復開夏日無童舉筠帚棗花如粟滿青苔病中寄家人繞院幽花手自栽春來應望賦歸來到家應在清明後留著幽香待我開題李白扁舟對月圖澄江如練月華秋月下仙人紫綺裘吟徹鳯凰臺上句醉中散髮弄扁舟雪橋早行圖村亭酒力能有幾橋如疲蹇才勝人千山凍合欲何往前頭應有無邊春題楚帆風雨橫披泛宅浮家百自由西州射利復東流滿帆風雨不知險岸上行人却漫愁千尺鯨舟載一城蒼茫遙認兩浮萍泰山不比秋毫重風雨掀天醉不醒桅顛五兩失晨占凍雨飛來風滿帆但著平生忠信在銀山鼓枻下巉巖樹倒山移帆腹弓持維扶柂一家同却愁上岸人心别不似艱難風雨中洶湧滄江雷雨垂布帆無恙出顛危舟師維楫休輕笑政怕風恬浪靜時答家信秋風偏與廣文寒誰著間雲也屬官不道長安米如玉書來頻為勸加餐六月八日晨起雨餘涼意葛衣輕短髮梳來坐復行幸自間人有忙甚呼兒為聽打門聲池州東方氏九世同居景德中旌表其門閭天章閣待制滕宗諒已嘗贈之詩乞詩姑賦二絶句枝葉扶疏大小宗雍容會食鼓聲中固知天理人心在不必區區忍字功九世光隂黍一炊一庭安用插籓籬蕪辭豈敢多題品已有吾家宗諒詩題史開府書後辭意殷勤首尾名相君愛子聘明經一封尺牘天留在猶與人間作典刑立秋日感懷西風入樹雨垂雲涼意蕭蕭遽十分老我今年耳全重亂蟬凄斷不多聞贈相者隨富隨貧任此生樂天真是晉淵明不知底許屏風樣幾箇臞儒辦得成人人都要畫麒麟此老屏風亦可人醉白堂中韓相國欲拋勳業慕前身諫疏堂堂叩帝閽老來乞得自由身不然取次圖慵卧畫作屏風恐誤人澤州秦天祿教授南陽詩以送之西溪詩價盛中州今代諸孫學更優看取南陽城下水江河浩浩復東流大藩師席不容虛張本平生萬卷書儻見卧龍憑寄語熙朝休苦戀茒廬晉産真淳席上珍胸中冰鑑筆頭春樂郊正可興文化鄭重南陽召信臣舊有田園汝水頭不妨官冷客南州況聞米麥猶加賤我亦明年具小舟經西狩獲麟故址有感不到周初麟趾篇惡風吹入魯西畋死逢尼父猶為幸炳耀春秋二百年跋集賢學士實魯衮所藏趙大年小景并睡犬橫披箕思周情到畫工人間凡馬總成空江湖逺意知多少却落君家小景中午日東城别墅二首不堪孤坐讀離騷政自幽情寫鬱陶行到溪邊見漁父未須勸我啜醨糟瘦馬獨行風滿衣微涼肅肅日暉暉片雲不作催詩雨直著清隂送我歸憶京雒木芍藥三絶熟美酣馨迸佳瑞暈稜紅碧化神工根株肇自韓郎染葩花人間一洗空沉香亭北壓欄干炫耀熒煌障幄寬不薄官梅伴飛霰只饒蘭蕙楚騷寒廬陵自昔攜參佐媚紫嬌黃魏與姚何物山丹衒流俗雒生懊惱愠蓬飄虎溪三笑圖步談不覺過前溪三老盧胡一笑齊溪若有靈應也笑我初無意限東西李守道三教會茶橫披邂逅山林有此逢瓦瓶石鼎自松風如何一味清泠物流入胸中各不同題王緯學正所藏扇暍圖扇暍千年入畫圖題詩人莫比溱輿只應痛惜施焚炙特示區區作諫書贈墨竹侯仲璋儘分詩意入經營露葉煙梢老不勝記得小軒清夢覺月窗搖影襯春冰直卿以絶句見示有鄧攸之嘆因隨韻慰喻之微恙渝平事事宜庭芳晚秀莫興悲鄧攸適未逢天定莫謂蒼蒼總不知臨江倅平定聶文綽挽章封龍卷後一題詩萬里江湖欲别時千載相思不相見可堪重為寫哀辭草堂初識紫芝眉傾倒春風酒一巵他日逢君雙驥子凄涼細話見君時題樊氏世系詩卷樊璧金天會中胡礪科登科仕至臨潢府尹子大中仕至洛陽丞再實根株鮮復芽固知造物靳才華臨潢料是多隂德還見兒孫續故家跋楊按察龍眠馬圖胸中冀北龍眠老想見盤盤下筆時世上不無千里馬按圖容不識權竒
